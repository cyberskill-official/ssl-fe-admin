fragment F_ReportUser on T_User {
    id
    username
    email
}

fragment F_ReportNote on T_Note {
    type
    content
    createdAt
    createdBy {
        id
        username
    }
}

fragment F_Report on T_Report {
    id
    type
    targetId
    moderationMediaId
    reportedBy {
        ...F_ReportUser
    }
    target {
        ...F_ReportUser
    }
    content
    reportedByIds
    reportedBy {
        ...F_ReportUser
    }
    createdAt
    status
    notes {
        ...F_ReportNote
    }
    moderationMedia {
        id
        entityId
        entity
        url
        type
        status
        uploadedBy {
            ...F_ReportUser
        }
    }
}

query getReports($filter: Input_QueryReport, $options: JSON) {
    getReports(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_Report
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

mutation createReport($doc: Input_CreateReport!) {
    createReport(doc: $doc) {
        success
        message
        result {
            ...F_Report
        }
    }
}

mutation updateReport($filter: Input_QueryReport!, $update: Input_UpdateReport, $options: JSON) {
    updateReport(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_Report
        }
    }
}

mutation deleteReport($filter: Input_QueryReport!, $options: JSON) {
    deleteReport(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_Report
        }
    }
}
