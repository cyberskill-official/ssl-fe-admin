query getKeyword($filter: Input_QueryKeyword!, $projection: JSON, $options: JSON, $populate: JSON) {
    getKeyword(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_Keyword
        }
    }
}

query getKeywords($filter: Input_QueryKeyword, $options: JSON) {
    getKeywords(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_Keyword
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

mutation createKeyword($doc: Input_CreateKeyword!) {
    createKeyword(doc: $doc) {
        success
        message
        result {
            ...F_Keyword
        }
    }
}

mutation updateKeyword($filter: Input_QueryKeyword!, $update: Input_UpdateKeyword!, $options: JSON) {
    updateKeyword(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_Keyword
        }
    }
}

mutation deleteKeyword($filter: Input_QueryKeyword!, $options: JSON) {
    deleteKeyword(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_Keyword
        }
    }
}
