fragment F_EmailCampaign on T_EmailCampaign {
    id
    isDel
    createdAt
    updatedAt
    name
    subject
    content
    senderName
    senderEmail
    target
    customRecipientsIds
    customRecipients {
        ...F_User
    }
    isScheduled
    scheduledDate
    scheduledTime
    recipientCount
    openCount
    clickCount
    jobIds
    isSent
}
