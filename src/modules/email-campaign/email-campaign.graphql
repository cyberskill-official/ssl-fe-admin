query GetEmailCampaign($filter: Input_QueryEmailCampaign!, $projection: JSON, $options: JSON, $populate: JSON) {
    getEmailCampaign(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_EmailCampaign
        }
    }
}

query GetEmailCampaigns($filter: Input_QueryEmailCampaign, $options: JSON) {
    getEmailCampaigns(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_EmailCampaign
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

mutation CreateEmailCampaign($doc: Input_CreateEmailCampaign!) {
    createEmailCampaign(doc: $doc) {
        success
        message
        result {
            ...F_EmailCampaign
        }
    }
}

mutation UpdateEmailCampaign($filter: Input_QueryEmailCampaign!, $update: Input_UpdateEmailCampaign!, $options: JSON) {
    updateEmailCampaign(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_EmailCampaign
        }
    }
}

mutation DeleteEmailCampaign($filter: Input_QueryEmailCampaign!, $options: JSON) {
    deleteEmailCampaign(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_EmailCampaign
        }
    }
}

mutation SendCampaignNow($filter: Input_QueryEmailCampaign!) {
    sendCampaignNow(filter: $filter) {
        success
        message
        result {
            ...F_EmailCampaign
        }
    }
}
