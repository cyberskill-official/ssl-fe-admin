fragment F_LegalDocumentHistory on T_LegalDocumentHistory {
    type
    content
    version
    updatedAt
    updatedById
    updatedBy {
        ...F_User
    }
}

fragment F_LegalDocument on T_LegalDocument {
    id
    isDel
    createdAt
    updatedAt
    type
    content
    status
    version
    history {
        ...F_LegalDocumentHistory
    }
}
