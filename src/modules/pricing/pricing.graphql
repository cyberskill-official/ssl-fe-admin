query getPricing($filter: Input_QueryPricing!, $projection: JSON, $options: JSON, $populate: JSON) {
    getPricing(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_Pricing
        }
    }
}

query getPricings($filter: Input_QueryPricing, $options: JSON) {
    getPricings(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_Pricing
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

query getSubscriptionPrice {
    getSubscriptionPrice {
        price
        currency
        taxRate
    }
}

mutation createPricing($doc: Input_CreatePricing!) {
    createPricing(doc: $doc) {
        success
        message
        result {
            ...F_Pricing
        }
    }
}

mutation updatePricing($filter: Input_QueryPricing!, $update: Input_UpdatePricing!, $options: JSON) {
    updatePricing(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_Pricing
        }
    }
}

mutation deletePricing($filter: Input_QueryPricing!, $options: JSON) {
    deletePricing(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_Pricing
        }
    }
}
