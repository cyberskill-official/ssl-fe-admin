query getPaymentAuditOrders($filter: Input_QueryOrder, $options: JSON) {
    getOrders(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                id
                createdAt
                updatedAt
                userId
                user {
                    id
                    username
                    email
                    lastLoginIp
                    membershipExpiresAt
                    membershipCancelled
                    roles {
                        id
                        name
                    }
                }
                amount
                status
                orderType
                paymentTransactionId
                paymentTransaction {
                    id
                    provider
                    operation
                    transactionId
                    providerEventId
                    paymentRequestId
                    subscriptionId
                    amount
                    currency
                    status
                    success
                    source
                    errorCode
                    errorMessage
                    occurredAt
                    performedAt
                }
                paymentRequests {
                    id
                    status
                    gateway
                    externalOrderId
                    meta
                    createdAt
                    updatedAt
                }
                effectsAppliedAt
                meta
                pricingId
                pricing {
                    id
                    type
                    price
                    taxRate
                    country {
                        id
                        name
                        iso2
                    }
                    currency {
                        id
                        code
                        symbol
                    }
                }
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

