query getTag($filter: Input_QueryTag!, $projection: JSON, $options: JSON, $populate: JSON) {
    getTag(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_Tag
        }
    }
}

query getTags($filter: Input_QueryTag, $options: JSON) {
    getTags(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_Tag
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

mutation createTag($doc: Input_CreateTag!) {
    createTag(doc: $doc) {
        success
        message
        result {
            ...F_Tag
        }
    }
}

mutation updateTag($filter: Input_QueryTag!, $update: Input_UpdateTag!, $options: JSON) {
    updateTag(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_Tag
        }
    }
}

mutation deleteTag($filter: Input_QueryTag!, $options: JSON) {
    deleteTag(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_Tag
        }
    }
}
