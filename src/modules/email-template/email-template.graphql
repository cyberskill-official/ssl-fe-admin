mutation UpdateEmailTemplate($filter: Input_QueryEmailTemplate!, $update: Input_UpdateEmailTemplate!, $options: JSON) {
    updateEmailTemplate(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_EmailTemplate
        }
    }
}

mutation DeleteEmailTemplate($filter: Input_QueryEmailTemplate!, $options: JSON) {
    deleteEmailTemplate(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_EmailTemplate
        }
    }
}

mutation CreateEmailTemplate($doc: Input_CreateEmailTemplate!) {
    createEmailTemplate(doc: $doc) {
        success
        message
        result {
            ...F_EmailTemplate
        }
    }
}

query GetEmailTemplate($filter: Input_QueryEmailTemplate!, $projection: JSON, $options: JSON, $populate: JSON) {
    getEmailTemplate(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_EmailTemplate
        }
    }
}

query GetEmailTemplates($filter: Input_QueryEmailTemplate, $options: JSON) {
    getEmailTemplates(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_EmailTemplate
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}
