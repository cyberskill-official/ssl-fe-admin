query getUsers($filter: Input_QueryUser, $options: JSON) {
    getUsers(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_User
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

mutation createUser($doc: Input_CreateUser!) {
    createUser(doc: $doc) {
        success
        message
        result {
            ...F_User
        }
    }
}

mutation updateUser($filter: Input_QueryUser!, $update: Input_UpdateUser!, $options: JSON) {
    updateUser(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_User
        }
    }
}

mutation deleteUser($filter: Input_QueryUser!, $options: JSON) {
    deleteUser(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_User
        }
    }
}

mutation deactivateUser($filter: Input_QueryUser!, $options: JSON) {
    deactivateUser(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_User
        }
    }
}

mutation adminBlockUser($doc: Input_AdminBlockUser!) {
    adminBlockUser(doc: $doc) {
        success
        message
        result {
            ...F_User
        }
    }
}

mutation adminUnBlockUser($filter: Input_AdminUnblockUser!) {
    adminUnBlockUser(filter: $filter) {
        success
        message
        result {
            ...F_User
        }
    }
}
