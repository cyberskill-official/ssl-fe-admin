query getPermissions($filter: Input_QueryPermission, $options: JSON) {
    getPermissions(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_Permission
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

mutation createPermission($doc: Input_CreatePermission!) {
    createPermission(doc: $doc) {
        success
        message
        result {
            ...F_Permission
        }
    }
}

mutation updatePermission($filter: Input_QueryPermission!, $update: Input_UpdatePermission, $options: JSON) {
    updatePermission(filter: $filter, update: $update, options: $options) {
        success
        message
        result {
            ...F_Permission
        }
    }
}

mutation deletePermission($filter: Input_QueryPermission!, $options: JSON) {
    deletePermission(filter: $filter, options: $options) {
        success
        message
        result {
            ...F_Permission
        }
    }
}
