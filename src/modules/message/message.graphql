mutation adminReplyGuest($input: Input_AdminReplyGuest!) {
    adminReplyGuest(input: $input) {
        success
        message
        result
    }
}

mutation createMessage($doc: Input_CreateMessage!) {
    createMessage(doc: $doc) {
        success
        message
        result {
            ...F_Message
        }
    }
}
