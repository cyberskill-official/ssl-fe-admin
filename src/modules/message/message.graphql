query getConversations($filter: Input_QueryConversation, $options: JSON) {
    getConversations(filter: $filter, options: $options) {
        success
        message
        result {
            docs {
                ...F_Conversation
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

query getSupportConversations($options: JSON) {
    getSupportConversations(options: $options) {
        success
        message
        result {
            docs {
                ...F_Conversation
            }
            totalDocs
            limit
            hasPrevPage
            hasNextPage
            page
            totalPages
            offset
            prevPage
            nextPage
            pagingCounter
            meta
        }
    }
}

query getConversation($filter: Input_QueryConversation!, $projection: JSON, $options: JSON, $populate: JSON) {
    getConversation(filter: $filter, projection: $projection, options: $options, populate: $populate) {
        success
        message
        result {
            ...F_Conversation
        }
    }
}

